<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller de Cinemática — Grado 10°</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f3ee;--surface:#fff;--surface2:#f0ede6;
  --border:rgba(60,55,45,.13);--border2:rgba(60,55,45,.26);
  --text:#1e1c18;--text2:#5a5650;--text3:#9a9590;
  --azul:#185FA5;--azul-l:#ddeaf7;--azul-d:#0C447C;
  --teal:#0F6E56;--teal-l:#d8f0e9;
  --amber:#BA7517;--amber-l:#faecd8;
  --verde:#3B6D11;--verde-l:#e2f0d4;
  --rojo:#A32D2D;--rojo-l:#fce6e6;
  --coral:#993C1D;--coral-l:#fae8e0;
  --shadow:0 2px 14px rgba(0,0,0,.07);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#17160f;--surface:#222018;--surface2:#2a2821;
    --border:rgba(255,255,255,.09);--border2:rgba(255,255,255,.18);
    --text:#e8e4dc;--text2:#a8a49c;--text3:#68645e;
    --azul:#4a92d6;--azul-l:#0c2e52;--azul-d:#78b4e8;
    --teal:#2eaa88;--teal-l:#083d2e;
    --amber:#e89a30;--amber-l:#3d2800;
    --verde:#68b030;--verde-l:#1a3306;
    --rojo:#d45a5a;--rojo-l:#3d1010;
    --coral:#d46040;--coral-l:#3d1a08;
    --shadow:0 2px 18px rgba(0,0,0,.45);
  }
}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

/* HERO */
.hero{background:linear-gradient(135deg,#0C447C 0%,#185FA5 60%,#1a7fc1 100%);color:#fff;padding:2.5rem 1.5rem 2rem;text-align:center;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:32px;background:var(--bg);clip-path:ellipse(55% 100% at 50% 100%)}
.hero-icon{font-size:2.8rem;margin-bottom:.5rem;filter:drop-shadow(0 2px 8px rgba(0,0,0,.25))}
.hero h1{font-size:clamp(1.5rem,4vw,2.1rem);font-weight:700;letter-spacing:-.02em;margin-bottom:.4rem}
.hero p{font-size:1rem;opacity:.88;max-width:480px;margin:0 auto 1.3rem}
.hero-badges{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.hero-badge{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.32);color:#fff;font-size:12px;padding:4px 14px;border-radius:20px;font-weight:500}

/* STICKY */
.sticky{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:.65rem 1.2rem;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow)}
.prog-label{font-size:12px;color:var(--text3);white-space:nowrap}
.prog-track{flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--azul),#1a7fc1);border-radius:4px;transition:width .4s ease}
.prog-score{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;min-width:52px;text-align:right}

/* NAV */
.nav-wrap{max-width:740px;margin:0 auto;padding:1.1rem 1.2rem .4rem}
.nav-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.nav-pills{display:flex;gap:7px;flex-wrap:wrap}
.pill{width:36px;height:36px;border-radius:50%;border:2px solid var(--border2);background:var(--surface);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.pill:hover{border-color:var(--azul);color:var(--azul)}
.pill.act{background:var(--azul);border-color:var(--azul);color:#fff;box-shadow:0 0 0 3px rgba(24,95,165,.2)}
.pill.ok{background:var(--verde);border-color:var(--verde);color:#fff}
.pill.fail{background:var(--rojo);border-color:var(--rojo);color:#fff}

/* CARD */
.main{max-width:740px;margin:0 auto;padding:1rem 1.2rem 4rem}
.qcard{background:var(--surface);border-radius:18px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;animation:fadeUp .28s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.qhead{background:var(--surface2);border-bottom:1px solid var(--border);padding:.9rem 1.3rem;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.qnum{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;font-weight:600}
.badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:11px;font-weight:700;padding:3px 11px;border-radius:20px;letter-spacing:.02em}
.b-mru{background:var(--azul-l);color:var(--azul-d)}
.b-mrua{background:var(--teal-l);color:var(--teal)}
.b-pos{background:#e8f0fb;color:#1a4a8a}
.b-vel{background:#ece8fb;color:#3a2a8a}
.b-baja{background:var(--verde-l);color:var(--verde)}
.b-media{background:var(--amber-l);color:var(--amber)}
.b-alta{background:var(--coral-l);color:var(--coral)}

.qbody{padding:1.3rem 1.3rem 1rem}
.qtxt{font-size:1rem;line-height:1.75;margin-bottom:1.1rem;color:var(--text)}
.svgwrap{border:1px solid var(--border);border-radius:12px;margin-bottom:1.1rem;background:var(--surface2);overflow:hidden}
.svgwrap svg{display:block;width:100%}
.hint{font-size:12px;color:var(--text3);padding:7px 13px;background:var(--surface2);border-radius:8px;border-left:3px solid var(--azul);margin-bottom:1.1rem}

/* OPCIONES */
.opts{display:flex;flex-direction:column;gap:9px}
.opt{display:flex;align-items:flex-start;gap:11px;padding:11px 14px;border:2px solid var(--border2);border-radius:11px;cursor:pointer;transition:all .15s;background:var(--surface);font-size:.92rem;color:var(--text);text-align:left;width:100%;font-family:inherit;line-height:1.5}
.opt:hover:not(.dis){border-color:var(--azul);background:var(--azul-l)}
.oletter{width:26px;height:26px;border-radius:50%;border:2px solid var(--border2);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0;margin-top:1px;transition:all .15s;background:var(--surface2)}
.opt.sel{border-color:var(--azul);background:var(--azul-l)}
.opt.sel .oletter{background:var(--azul);color:#fff;border-color:var(--azul)}
.opt.cor{border-color:var(--verde);background:var(--verde-l)}
.opt.cor .oletter{background:var(--verde);color:#fff;border-color:var(--verde)}
.opt.wrg{border-color:var(--rojo);background:var(--rojo-l)}
.opt.wrg .oletter{background:var(--rojo);color:#fff;border-color:var(--rojo)}
.opt.dis{cursor:default}
.opt.dis:hover:not(.cor):not(.wrg){border-color:var(--border2);background:var(--surface)}

/* FEEDBACK */
.fb{margin-top:1rem;padding:13px 16px;border-radius:11px;font-size:.9rem;line-height:1.7;display:none;animation:fadeUp .2s ease}
.fb.show{display:block}
.fb.ok{background:var(--verde-l);border:1.5px solid var(--verde)}
.fb.fail{background:var(--rojo-l);border:1.5px solid var(--rojo)}
.fbtitle{font-weight:700;font-size:1rem;margin-bottom:5px}
.fb.ok .fbtitle{color:var(--verde)}
.fb.fail .fbtitle{color:var(--rojo)}

/* FOOTER */
.qfoot{border-top:1px solid var(--border);padding:.9rem 1.3rem;display:flex;justify-content:space-between;align-items:center;gap:8px}
.btn{padding:9px 22px;border-radius:9px;border:2px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
.btn:hover{background:var(--surface2)}
.btnp{background:var(--azul);border-color:var(--azul);color:#fff}
.btnp:hover{background:var(--azul-d)}

/* RESULTADOS */
.results{display:none;max-width:740px;margin:0 auto;padding:1rem 1.2rem 4rem}
.results.on{display:block}
.rcrd{background:var(--surface);border-radius:18px;border:1px solid var(--border);box-shadow:var(--shadow);text-align:center;padding:2.5rem 2rem 2rem;margin-bottom:1.3rem;animation:fadeUp .3s ease}
.remoji{font-size:3.5rem;margin-bottom:.8rem}
.rtitle{font-size:1.7rem;font-weight:700;margin-bottom:.4rem}
.rsub{color:var(--text2);margin-bottom:1.5rem;font-size:.95rem}
.rbig{font-size:3.2rem;font-weight:800;color:var(--azul);line-height:1}
.rbiglbl{font-size:13px;color:var(--text3);margin:.4rem 0 1.5rem}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem}
.rstat{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1rem}
.rstat-val{font-size:2rem;font-weight:800}
.rstat-lbl{font-size:12px;color:var(--text3);margin-top:2px}
.rstat.g .rstat-val{color:var(--verde)}
.rstat.r .rstat-val{color:var(--rojo)}
.revh{font-size:15px;font-weight:700;color:var(--text2);margin-bottom:10px}
.revlist{display:flex;flex-direction:column;gap:9px}
.revitem{background:var(--surface);border:1.5px solid var(--border);border-radius:11px;padding:11px 14px;display:flex;align-items:center;gap:11px;font-size:13px}
.revitem.ok{border-color:var(--verde);background:var(--verde-l)}
.revitem.fail{border-color:var(--rojo);background:var(--rojo-l)}
.revnum{font-weight:700;color:var(--text2);min-width:24px}
.revicon{font-size:16px;flex-shrink:0}
.revtxt{flex:1;color:var(--text2);font-size:12px;line-height:1.4}
.btnrev{padding:5px 12px;font-size:12px;border-radius:7px;border:1.5px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s;white-space:nowrap}
.btnrev:hover{background:var(--surface2)}
@media(max-width:480px){.qbody,.qhead,.qfoot{padding:.9rem 1rem}.hero{padding:2rem 1rem 1.5rem}}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-icon">⚡</div>
  <h1>Taller de Cinemática</h1>
  <p>Análisis gráfico de MRU y MRUA · Grado 10°</p>
  <div class="hero-badges">
    <span class="hero-badge">10 preguntas</span>
    <span class="hero-badge">Gráficas verificadas</span>
    <span class="hero-badge">Retroalimentación inmediata</span>
  </div>
</div>

<div class="sticky">
  <span class="prog-label">Progreso</span>
  <div class="prog-track"><div class="prog-fill" id="pf" style="width:0%"></div></div>
  <span class="prog-score" id="ps">0 / 0</span>
</div>

<div class="nav-wrap">
  <div class="nav-label">Ir a pregunta</div>
  <div class="nav-pills" id="nav"></div>
</div>

<div class="main" id="qmain"><div class="qcard" id="qcard"></div></div>
<div class="results" id="rpanel"></div>

<script>
/* ═══════════════════════════════════════════════
   DATOS DE PREGUNTAS — GRÁFICAS MATEMÁTICAMENTE VERIFICADAS
   Cada SVG usa coordenadas calculadas con Python
   ═══════════════════════════════════════════════ */
const QS = [

/* ──────────── P1: MRU posición-tiempo ────────────
   x(t) = (40/6)t ≈ 6.67 m/s   (velocidad constante)
   Escala: t→px = 50+t*52,  x→y = 195 - x*3.3
   Puntos verificados:
     t=0→(50,195)  t=3→(206,129)  t=6→(362,63)
   Marcas y: 10m→y=162  20m→y=129  30m→y=96  40m→y=63
──────────────────────────────────────────────────── */
{tipo:"MRU",graf:"Posición-tiempo",dif:"Baja",
txt:"La gráfica muestra la posición de una bicicleta en función del tiempo. ¿Cuál de las siguientes afirmaciones describe mejor el movimiento de la bicicleta?",
svg:`<svg viewBox="0 0 430 225" xmlns="http://www.w3.org/2000/svg">
  <defs><marker id="ah" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0, 7 3.5, 0 7" fill="#888"/></marker></defs>
  <!-- Ejes -->
  <line x1="50" y1="195" x2="410" y2="195" stroke="#888" stroke-width="1.3" marker-end="url(#ah)"/>
  <line x1="50" y1="195" x2="50"  y2="18"  stroke="#888" stroke-width="1.3" marker-end="url(#ah)"/>
  <text x="413" y="199" font-size="12" fill="#888" font-family="sans-serif">t (s)</text>
  <text x="16"  y="18"  font-size="12" fill="#888" font-family="sans-serif">x (m)</text>
  <!-- Marcas eje t: 1-6 s  (px = 50+t*52) -->
  <line x1="102" y1="192" x2="102" y2="198" stroke="#888" stroke-width="1"/><text x="102" y="210" font-size="11" fill="#888" font-family="sans-serif" text-anchor="middle">1</text>
  <line x1="154" y1="192" x2="154" y2="198" stroke="#888" stroke-width="1"/><text x="154" y="210" font-size="11" fill="#888" font-family="sans-serif" text-anchor="middle">2</text>
  <line x1="206" y1="192" x2="206" y2="198" stroke="#888" stroke-width="1"/><text x="206" y="210" font-size="11" fill="#888" font-family="sans-serif" text-anchor="middle">3</text>
  <line x1="258" y1="192" x2="258" y2="198" stroke="#888" stroke-width="1"/><text x="258" y="210" font-size="11" fill="#888" font-family="sans-serif" text-anchor="middle">4</text>
  <line x1="310" y1="192" x2="310" y2="198" stroke="#888" stroke-width="1"/><text x="310" y="210" font-size="11" fill="#888" font-family="sans-serif" text-anchor="middle">5</text>
  <line x1="362" y1="192" x2="362" y2="198" stroke="#888" stroke-width="1"/><text x="362" y="210" font-size="11" fill="#888" font-family="sans-serif" text-anchor="middle">6</text>
  <!-- Marcas eje x: 10,20,30,40 m  (y = 195 - x*3.3) -->
  <line x1="47" y1="162" x2="53" y2="162" stroke="#888" stroke-width="1"/><text x="44" y="166" font-size="11" fill="#888" font-family="sans-serif" text-anchor="end">10</text>
  <line x1="47" y1="129" x2="53" y2="129" stroke="#888" stroke-width="1"/><text x="44" y="133" font-size="11" fill="#888" font-family="sans-serif" text-anchor="end">20</text>
  <line x1="47" y1="96"  x2="53" y2="96"  stroke="#888" stroke-width="1"/><text x="44" y="100" font-size="11" fill="#888" font-family="sans-serif" text-anchor="end">30</text>
  <line x1="47" y1="63"  x2="53" y2="63"  stroke="#888" stroke-width="1"/><text x="44" y="67"  font-size="11" fill="#888" font-family="sans-serif" text-anchor="end">40</text>
  <!-- Recta MRU: (50,195)→(362,63) -->
  <line x1="50" y1="195" x2="362" y2="63" stroke="#185FA5" stroke-width="2.8" stroke-linecap="round"/>
  <circle cx="50"  cy="195" r="4.5" fill="#185FA5"/>
  <circle cx="362" cy="63"  r="4.5" fill="#185FA5"/>
  <text x="368" y="61" font-size="11" fill="#185FA5" font-family="sans-serif" font-weight="600">(6 s, 40 m)</text>
</svg>`,
opts:["La bicicleta está frenando progresivamente porque la línea sube hacia arriba.",
      "La bicicleta se mueve con velocidad constante porque la gráfica es una línea recta con pendiente positiva.",
      "La bicicleta acelera porque la posición aumenta con el tiempo.",
      "La bicicleta está en reposo porque no cambia de dirección."],
cor:1,
just:"En una gráfica posición-tiempo, una <strong>línea recta</strong> indica velocidad constante (MRU). La pendiente es la velocidad: <em>v = Δx/Δt = 40 m / 6 s ≈ 6,7 m/s</em>. Que la posición aumente no implica aceleración; la aceleración aparece como una curva, no como una recta."},

/* ──────────── P2: MRU velocidad-tiempo ────────────
   v = 5 m/s (constante). t=[0,8 s]
   Escala: t→px = 50+t*40,  v→y = 195 - v*16
   Marca v=5: y=115.  Área = 8×5 = 40 m
──────────────────────────────────────────────────── */
{tipo:"MRU",graf:"Velocidad-tiempo",dif:"Baja",
txt:"La gráfica muestra la velocidad de un patinador durante 8 segundos. ¿Qué distancia total recorrió el patinador en ese intervalo?",
svg:`<svg viewBox="0 0 430 225" xmlns="http://www.w3.org/2000/svg">
  <defs><marker id="ah2" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0, 7 3.5, 0 7" fill="#888"/></marker></defs>
  <line x1="50" y1="195" x2="410" y2="195" stroke="#888" stroke-width="1.3" marker-end="url(#ah2)"/>
  <line x1="50" y1="195" x2="50"  y2="18"  stroke="#888" stroke-width="1.3" marker-end="url(#ah2)"/>
  <text x="413" y="199" font-size="12" fill="#888" font-family="sans-serif">t (s)</text>
  <text x="16"  y="18"  font-size="12" fill="#888" font-family="sans-serif">v (m/s)</text>
  <!-- Marcas t: 1-8 s  (px = 50+t*40) -->
  <line x1="90"  y1="192" x2="90"  y2="198" stroke="#888" stroke-width="1"/><text x="90"  y="210" font-size="11" fill="#888" font-family="sans-serif" text-anchor="middle">1</text>
  <line x1="130" y1="192" x2="130" y2="198" stroke="#888" stroke-width="1"/><text x="130" y="210" font-size="11" fill="#888" font-family="sans-serif" text-anchor="middle">2</text>
  <line x1="170" y1="192" x2="170" y2="198" stroke="#888" stroke-width="1"/><text x="170" y="210" font-size="11" fill="#888" font-family="sans-serif" text-anchor="middle">3</text>
  <line x1="210" y1="192" x2="210" y2="198" stroke="#888" stroke-width="1"/><text x="210" y="210" font-size="11" fill="#888" font-family="sans-serif" text-anchor="middle">4</text>
  <line x1="250" y1="192" x2="250" y2="198" stroke="#888" stroke-width="1"/><text x="250" y="210" font-size="11" fill="#888" font-family="sans-serif" text-anchor="middle">5</text>
  <line x1="290" y1="192" x2="290" y2="198" stroke="#888" stroke-width="1"/><text x="290" y="210" font-size="11" fill="#888" font-family="sans-serif" text-anchor="middle">6</text>
  <line x1="330" y1="192" x2="330" y2="198" stroke="#888" stroke-width="1"/><text x="330" y="210" font-size="11" fill="#888" font-family="sans-serif" text-anchor="middle">7</text>
  <line x1="370" y1="192" x2="370" y2="198" stroke="#888" stroke-width="1"/><text x="370" y="210" font-size="11" fill="#888" font-family="sans-serif" text-anchor="middle">8</text>
  <!-- Marca v=5: y=115 -->
  <line x1="47" y1="115" x2="53" y2="115" stroke="#888" stroke-width="1"/><text x="44" y="119" font-size="11" fill="#888" font-family="sans-serif" text-anchor="end">5</text>
  <!-- Área bajo la curva -->
  <rect x="50" y="115" width="320" height="80" fill="#185FA5" opacity="0.11"/>
  <!-- Línea horizontal v=5 -->
  <line x1="50" y1="115" x2="370" y2="115" stroke="#185FA5" stroke-width="2.8" stroke-linecap="round"/>
  <circle cx="50"  cy="115" r="4.5" fill="#185FA5"/>
  <circle cx="370" cy="115" r="4.5" fill="#185FA5"/>
  <!-- Etiqueta área -->
  <text x="210" y="162" font-size="12" fill="#185FA5" font-family="sans-serif" text-anchor="middle" font-weight="600">Área = distancia recorrida</text>
</svg>`,
opts:["5 m, porque la velocidad es 5 m/s en todo momento.",
      "13 m, porque se divide la velocidad entre el tiempo.",
      "40 m, porque el área bajo la gráfica velocidad-tiempo representa la distancia recorrida.",
      "8 m, porque el tiempo total es 8 s y esa es la lectura del eje."],
cor:2,
just:"En una gráfica velocidad-tiempo, el <strong>área bajo la curva</strong> representa la distancia recorrida. El área es un rectángulo: Área = base × altura = 8 s × 5 m/s = <strong>40 m</strong>. Las demás opciones leen directamente un valor del eje en lugar de calcular el área."},

/* ──────────── P3: MRUA velocidad-tiempo ────────────
   v(t) = 5t m/s  →  a = 5 m/s².  t=[0,6 s], v=[0,30 m/s]
   Escala: t→px = 50+t*52,  v→y = 195 - v*3.3
   Puntos: (50,195),(154,162),(258,129),(362,96)
   Marcas v: 10→y=162  20→y=129  30→y=96
   Triángulo auxiliar: t=2→t=6 (Δt=4s), Δv=20 → a=5 m/s²
──────────────────────────────────────────────────── */
{tipo:"MRUA",graf:"Velocidad-tiempo",dif:"Baja",
txt:"Un automóvil arranca desde el reposo y acelera uniformemente. La gráfica muestra cómo cambia su velocidad. ¿Cuánto vale la aceleración del automóvil?",
svg:`<svg viewBox="0 0 430 225" xmlns="http://www.w3.org/2000/svg">
  <defs><marker id="ah3" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0, 7 3.5, 0 7" fill="#888"/></marker></defs>

/* ══════════════ LÓGICA DE LA APLICACIÓN ══════════════ */
const ST = { act:0, resp:{} };
const LETS = ['A','B','C','D'];

function ncor(){let c=0;for(const k in ST.resp)if(ST.resp[k]===QS[k].cor)c++;return c;}
function nresp(){return Object.keys(ST.resp).length;}

function updBar(){
  const r=nresp(),c=ncor();
  document.getElementById('pf').style.width=(r/QS.length*100)+'%';
  document.getElementById('ps').textContent=c+' / '+r;
}

function renderNav(){
  document.getElementById('nav').innerHTML=QS.map((_,i)=>{
    let cl='pill';
    if(i===ST.act)cl+=' act';
    else if(ST.resp[i]!==undefined)cl+=ST.resp[i]===QS[i].cor?' ok':' fail';
    return`<button class="${cl}" onclick="goTo(${i})">${i+1}</button>`;
  }).join('');
}

function badges(q){
  const tc=q.tipo==='MRU'?'b-mru':'b-mrua';
  const gc=q.graf.includes('Pos')?'b-pos':'b-vel';
  const dc={Baja:'b-baja',Media:'b-media',Alta:'b-alta'}[q.dif]||'b-baja';
  return`<span class="badge ${tc}">${q.tipo}</span><span class="badge ${gc}">${q.graf}</span><span class="badge ${dc}">Dificultad ${q.dif}</span>`;
}

function renderQ(i){
  const q=QS[i], r=ST.resp[i], done=r!==undefined;
  const opts=q.opts.map((op,j)=>{
    let cl='opt';
    if(done){cl+=' dis';if(j===q.cor)cl+=' cor';else if(j===r)cl+=' wrg';}
    return`<button class="${cl}"${!done?` onclick="pick(${i},${j})"`:''}>
      <span class="oletter">${LETS[j]}</span><span>${op}</span></button>`;
  }).join('');
  const fb=done?`<div class="fb ${r===q.cor?'ok':'fail'} show">
    <div class="fbtitle">${r===q.cor?'✓ ¡Correcto!':'✗ Respuesta incorrecta'}</div>${q.just}</div>`:'';
  const prev=i>0?`<button class="btn" onclick="goTo(${i-1})">← Anterior</button>`:`<span></span>`;
  const next=i<QS.length-1
    ?`<button class="btn btnp" onclick="goTo(${i+1})">Siguiente →</button>`
    :`<button class="btn btnp" onclick="showRes()">Ver resultados →</button>`;
  document.getElementById('qcard').innerHTML=`
    <div class="qhead"><div><div class="qnum">Pregunta ${i+1} de ${QS.length}</div><div class="badges">${badges(q)}</div></div></div>
    <div class="qbody">
      <p class="qtxt">${q.txt}</p>
      <div class="svgwrap">${q.svg}</div>
      <p class="hint">💡 Analiza la gráfica con detenimiento antes de responder.</p>
      <div class="opts">${opts}</div>${fb}
    </div>
    <div class="qfoot">${prev}${next}</div>`;
}

function goTo(i){
  document.getElementById('rpanel').classList.remove('on');
  document.getElementById('qmain').style.display='';
  document.querySelector('.nav-wrap').style.display='';
  ST.act=i; renderNav(); renderQ(i); updBar();
  document.querySelector('.sticky').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function pick(qi,oi){
  if(ST.resp[qi]!==undefined)return;
  ST.resp[qi]=oi; renderNav(); renderQ(qi); updBar();
}

function showRes(){
  const tot=QS.length,c=ncor(),r=nresp(),inc=r-c;
  const pct=Math.round(c/tot*100);
  let em,ti;
  if(pct>=90){em='🏆';ti='¡Excelente trabajo!';}
  else if(pct>=70){em='🎉';ti='¡Muy bien!';}
  else if(pct>=50){em='📚';ti='Buen intento, sigue practicando';}
  else{em='💪';ti='¡No te rindas, repasa los conceptos!';}
  const rev=QS.map((q,i)=>{
    const ok=ST.resp[i]===q.cor;
    return`<div class="revitem ${ok?'ok':'fail'}">
      <span class="revnum">${i+1}</span>
      <span class="revicon">${ok?'✓':'✗'}</span>
      <span class="revtxt">${q.txt.substring(0,75)}…</span>
      <button class="btnrev" onclick="goTo(${i})">Revisar</button></div>`;
  }).join('');
  document.getElementById('rpanel').innerHTML=`
    <div class="rcrd">
      <div class="remoji">${em}</div>
      <div class="rtitle">${ti}</div>
      <div class="rsub">Taller de Cinemática · Grado 10°</div>
      <div class="rbig">${pct}%</div>
      <div class="rbiglbl">de aciertos sobre ${tot} preguntas</div>
      <div class="rgrid">
        <div class="rstat g"><div class="rstat-val">${c}</div><div class="rstat-lbl">Correctas</div></div>
        <div class="rstat r"><div class="rstat-val">${inc}</div><div class="rstat-lbl">Incorrectas</div></div>
      </div>
      <button class="btn btnp" style="padding:10px 28px;font-size:14px" onclick="restart()">🔄 Intentar de nuevo</button>
    </div>
    <div class="revh">Revisión de respuestas</div>
    <div class="revlist">${rev}</div>`;
  document.getElementById('qmain').style.display='none';
  document.querySelector('.nav-wrap').style.display='none';
  document.getElementById('rpanel').classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}

function restart(){
  ST.act=0;
  for(const k in ST.resp)delete ST.resp[k];
  goTo(0);
}

goTo(0);
</script>
</body>
</html>
